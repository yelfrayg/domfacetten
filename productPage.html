<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Domfacetten - Produktübersicht</title>
        <link rel="stylesheet" href="/frontend/assets/base.css" />
        <link rel="stylesheet" href="/frontend/assets/header.css" />
        <link rel="stylesheet" href="/frontend/assets/index.css" />
        <link rel="stylesheet" href="/frontend/assets/products.css" />
        <link rel="stylesheet" href="./frontend/assets/footer.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        />
        <link rel="icon" href="../images/smallLogo.png" type="image/png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=Rufina:wght@400;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <header>
            <div class="header-container">
                <div class="logo-container">
                    <img src="./images/Firmenlogo.svg" alt="Logo" />
                </div>
                <nav class="header-nav">
                    <ul class="header-nav-list">
                        <li><a href="/">Home</a></li>
                        <li class="active"><a href="/productPage.html">Produkte</a></li>
                        <li><a href="/places.html">Orte</a></li>
                    </ul>
                </nav>
                <div class="header-burger"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg></div>
                <aside class="mobile-menu">
                    <ul class="mobile-menu-list">
                        <li><a href="/">Home</a></li>
                        <li class ="active"><a href="/productPage.html">Produkte</a></li>
                        <li><a href="/places.html">Orte</a></li>
                    </ul>
                </aside>
            </div>
        </header>
        <main>
            <section class="welcome-text">
                <h1>Domfacetten.<br />Schmuck mit Herz, designed in Köln.</h1>
            </section>

            <section class="product-section">
                <div class="heading-wrapper">
                    <h2>Alle Produkte</h2>
                    <button
                        class="filter-mobile"
                        commandfor="filter-mobile-popup"
                        command="show-modal"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z"/></svg>
                    </button>
                    <dialog id="filter-mobile-popup">
                        <h3>Filter</h3>
                        <hr />
                        <ul class="filters">
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Rot</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="red"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Grün</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="green"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Gelb</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="yellow"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Schwarz</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="black"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Armband</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="wrist"
                                    />
                                </span>
                            </li>
                        </ul>
                        <button commandfor="filter-mobile-popup" command="close" class = "accept-changes">
                            Anwenden
                        </button>
                    </dialog>
                </div>

                <div class="product-wrapper">
                    <aside class="filter">
                        <h3>Filter</h3>
                        <hr />
                        <ul class="filters">
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Rot</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="red"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Grün</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="green"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Gelb</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="yellow"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Schwarz</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="black"
                                    />
                                </span>
                            </li>
                            <li class="filter-object-wrapper">
                                <span class="filter-object">
                                    <p>Armband</p>
                                    <input
                                        type="checkbox"
                                        name="checkmark"
                                        id="checkmark"
                                        data-value="wrist"
                                    />
                                </span>
                            </li>
                        </ul>
                    </aside>
                    <div class="products-container">
                        <!-- <div class="product">
                            <div class="product-img-container">
                                <img src="images/products/ABRotWeiß_2.jpg" alt="Stoffarmband">
                                <span class = "product-nr">A034</span>
                            </div>
                            <div class="product-info">
                                <h3 class = "product-name">Stoffarmband</h3>
                                <p class="product-price">6,00 €</p>
                            </div>
                        </div> -->
                    </div>
                </div>
            </section>
        </main>
        <footer>
            <div class="footer-container">
                <img src="./images/Firmenlogo.svg" alt="Domfacetten" />
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/places.html">Kontakt</a></li>
                    <li><a href="/terms.html">AGB</a></li>
                </ul>
                <p>&copy; 2026 Domfacetten</p>
            </div>
        </footer>
        <script src="./scripts/main.js"></script>
        <script src="./scripts/productPage.js"></script>
    </body>
</html>
